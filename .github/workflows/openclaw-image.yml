name: Build OpenClaw Runtime Image

# Triggers:
#   - Daily at 04:00 UTC: check npm for new OpenClaw version
#   - Manual: build on demand (optionally pin a version)
on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:
    inputs:
      openclaw_version:
        description: 'OpenClaw version to build (default: latest)'
        default: 'latest'
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/openclaw-runtime

jobs:
  # ── Step 1: Check if a new version needs building ──
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Check latest OpenClaw version
        id: check
        run: |
          if [ "${{ github.event.inputs.openclaw_version }}" != "" ] && [ "${{ github.event.inputs.openclaw_version }}" != "latest" ]; then
            VERSION="${{ github.event.inputs.openclaw_version }}"
          else
            VERSION=$(npm view openclaw version)
          fi
          echo "Latest OpenClaw version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Check if this version already exists in ghcr.io
          if docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$VERSION > /dev/null 2>&1; then
            echo "Image for $VERSION already exists, skipping"
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "Image for $VERSION not found, will build"
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

      - name: Summary
        run: |
          echo "### OpenClaw Image Check" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${{ steps.check.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Should build: ${{ steps.check.outputs.should_build }}" >> $GITHUB_STEP_SUMMARY

  # ── Step 2: Build and push multi-arch image ──
  build:
    needs: check
    if: needs.check.outputs.should_build == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU (for ARM64 cross-compilation)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.openclaw-slim
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:slim
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.check.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=OpenClaw Runtime
            org.opencontainers.image.description=Self-contained OpenClaw runtime with Python and version-switch entrypoint
            org.opencontainers.image.version=${{ needs.check.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Verify image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.check.outputs.version }}
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.check.outputs.version }} --version

      - name: Summary
        run: |
          echo "### OpenClaw Image Built" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${{ needs.check.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tags:" >> $GITHUB_STEP_SUMMARY
          echo "  - \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:slim\`" >> $GITHUB_STEP_SUMMARY
          echo "  - \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "  - \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.check.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Platforms: linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Pull: \`docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:slim\`" >> $GITHUB_STEP_SUMMARY
